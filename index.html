<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="calculator">
        <div class="screen">
            <div>?</div>
            <div class="currentScreen">0</div>
        </div>
        <div class="buttons">
            <div class="row row1">
                <button>9</button>
                <button>8</button>
                <button>7</button>
                <button>+</button>
            </div>
            <div class="row row2">
                <button>6</button>
                <button>5</button>
                <button>4</button>
                <button>-</button>
            </div>
            <div class="row row3">
                <button>3</button>
                <button>2</button>
                <button>1</button>
                <button>*</button>
            </div>
            <div class="row row4">
                <button>0</button>
                <button>.</button>
                <button>AC</button>
                <button>=</button>
                <button>/</button>
            </div>
            
       
        </div>
    </div>
    
</body>
</html>
